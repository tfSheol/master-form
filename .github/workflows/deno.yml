name: Deno

on: push

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: 14
      - run: npm install
      - name: Run Karma Tests
        uses: ahmedrizwan/angular-karma-test-action
      - name: Run Tests
        run: deno test -A --unstable
